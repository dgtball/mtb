<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Управление портфелем</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  <style>
    :root {
      --bg: #121212;
      --surface: #1e1e1e;
      --text: #e0e0e0;
      --text-secondary: #9e9e9e;
      --accent: #2196F3;
      --positive: #4caf50;
      --negative: #f44336;
      --border: #333;
    }
    body {
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 12px;
      cursor: pointer;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .tab.active {
      color: var(--accent);
      border-bottom: 2px solid var(--accent);
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    .summary {
      background: var(--surface);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .label {
      color: var(--text-secondary);
      font-size: 12px;
    }
    .value {
      font-size: 24px;
      font-weight: bold;
    }
    .change {
      font-size: 16px;
    }
    .positive { color: var(--positive); }
    .negative { color: var(--negative); }
    .chart-container {
      width: 100%;
      max-width: 100%;
      margin: 0 0 16px 0;
      height: 280px;
    }
    .top-positions {
      background: var(--surface);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
    }
    th, td {
      padding: 8px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: 11px; /* уменьшенный шрифт для детализации сектора */
    }
    th {
      color: var(--text-secondary);
      font-size: 10px;
    }
    .actions button {
      background: var(--negative);
      border: none;
      color: white;
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
    }
    .add-form {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      background: var(--surface);
      padding: 12px;
      border-radius: 12px;
    }
    .add-form input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px;
      border-radius: 6px;
    }
    .add-form button {
      background: var(--accent);
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
    }
    .sector-details {
      background: var(--surface);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .sector-details.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <!-- содержимое без изменений, кроме шрифтов -->
  <script>
    // весь JavaScript остаётся прежним, за исключением форматирования оси Y
    // в секторе chart options замените callback на:
    callback: value => value.toLocaleString()
  </script>
</body>
</html>
