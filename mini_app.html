<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Управление портфелем</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #121212;
      --surface: #1e1e1e;
      --text: #e0e0e0;
      --text-secondary: #9e9e9e;
      --accent: #2196F3;
      --positive: #4caf50;
      --negative: #f44336;
      --border: #333;
    }
    body {
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 12px;
      cursor: pointer;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .tab.active {
      color: var(--accent);
      border-bottom: 2px solid var(--accent);
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    .summary {
      background: var(--surface);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .label {
      color: var(--text-secondary);
      font-size: 12px;
    }
    .value {
      font-size: 24px;
      font-weight: bold;
    }
    .change {
      font-size: 16px;
    }
    .positive { color: var(--positive); }
    .negative { color: var(--negative); }
    .chart-container {
      width: 100%;
      max-width: 100%;
      margin: 0 0 16px 0;
      height: 250px;
    }
    .top-positions {
      background: var(--surface);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
    }
    th, td {
      padding: 8px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
    }
    th {
      color: var(--text-secondary);
      font-size: 10px;
    }
    .actions button {
      background: var(--negative);
      border: none;
      color: white;
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
    }
    .add-form {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      background: var(--surface);
      padding: 12px;
      border-radius: 12px;
    }
    .add-form input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px;
      border-radius: 6px;
    }
    .add-form button {
      background: var(--accent);
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
    }
    .sector-details {
      background: var(--surface);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .sector-details.hidden {
      display: none;
    }
    .error-message {
      color: #f44336;
      padding: 20px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('portfolio')">Портфель</div>
    <div class="tab" onclick="switchTab('overrides')">Переименования</div>
  </div>

  <div id="portfolio" class="tab-content active">
    <div class="summary">
      <div class="summary-row">
        <span class="label">Стоимость портфеля</span>
        <span class="value" id="totalAmount">—</span>
      </div>
      <div class="summary-row">
        <span class="label">Изменение за день</span>
        <span class="change" id="dailyChange">—</span>
      </div>
    </div>
    <div class="chart-container">
      <canvas id="sectorChart"></canvas>
    </div>
    <div id="sectorDetails" class="sector-details hidden"></div>
    <div class="top-positions">
      <h3>📈 Лидеры роста</h3>
      <table id="gainersTable"><thead><tr><th>Название</th><th>Цена</th><th>Изм.</th></tr></thead><tbody></tbody></table>
      <h3>📉 Лидеры падения</h3>
      <table id="losersTable"><thead><tr><th>Название</th><th>Цена</th><th>Изм.</th></tr></thead><tbody></tbody></table>
    </div>
  </div>

  <div id="overrides" class="tab-content">
    <div class="add-form">
      <input type="text" id="newTicker" placeholder="Тикер">
      <input type="text" id="newName" placeholder="Новое название">
      <button onclick="addOverride()">Добавить</button>
    </div>
    <table>
      <thead><tr><th>Тикер</th><th>Название</th><th></th></tr></thead>
      <tbody id="overridesTable"></tbody>
    </table>
  </div>

<script>
  const API_TOKEN = 'MINI_APP_TOKEN_PLACEHOLDER';
  let sectorChart;
  let allPositions = [];

  async function apiCall(endpoint, method = 'GET', body = null) {
    const url = `${endpoint}?token=${encodeURIComponent(API_TOKEN)}`;
    const options = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) options.body = JSON.stringify(body);
    const res = await fetch(url, options);
    if (!res.ok) {
      console.error('Request failed', res.status, await res.text());
      throw new Error('Request failed');
    }
    return res.json();
  }

  async function loadPortfolio() {
    try {
      const data = await apiCall('/api/portfolio');
      document.getElementById('totalAmount').textContent = data.total_amount.toLocaleString() + ' ₽';
      const change = data.daily_change_pct;
      const changeEl = document.getElementById('dailyChange');
      if (change !== null && change !== undefined) {
        changeEl.textContent = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';
        changeEl.className = 'change ' + (change >= 0 ? 'positive' : 'negative');
      } else {
        changeEl.textContent = '—';
        changeEl.className = 'change';
      }

      allPositions = data.positions || [];

      if (data.sectors.length > 0) {
        const totalValue = data.sectors.reduce((sum, s) => sum + s.value, 0);
        const labels = data.sectors.map(s => s.name);
        const values = data.sectors.map(s => s.value);
        const percentages = data.sectors.map(s => totalValue > 0 ? (s.value / totalValue * 100) : 0);

        const ctx = document.getElementById('sectorChart').getContext('2d');
        if (sectorChart) sectorChart.destroy();
        sectorChart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: labels,
            datasets: [{
              data: values,
              backgroundColor: '#2196F3',
              borderRadius: 4,
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: { enabled: false },
            },
            scales: {
              x: {
                ticks: { color: '#9e9e9e' },
                grid: { display: false }
              },
              y: {
                ticks: { 
                  color: '#9e9e9e',
                  callback: value => value.toLocaleString()
                },
                grid: { color: '#333' }
              }
            },
            animation: {
              onComplete: function() {
                const chartInstance = this;
                const ctx = chartInstance.ctx;
                ctx.fillStyle = '#e0e0e0';
                ctx.font = 'bold 11px sans-serif';
                ctx.textAlign = 'center';
                chartInstance.data.datasets[0].data.forEach((value, index) => {
                  const meta = chartInstance.getDatasetMeta(0);
                  const x = meta.data[index].x;
                  const y = meta.data[index].y - 10;
                  ctx.fillText(percentages[index].toFixed(1) + '%', x, y);
                });
              }
            },
            onClick: (event, elements, chart) => {
              let index = null;
              if (elements.length > 0) {
                index = elements[0].index;
              } else {
                const xScale = chart.scales.x;
                const xPixel = event.x;
                const labelIndex = xScale.getValueForPixel(xPixel);
                if (typeof labelIndex === 'number' && labelIndex >= 0 && labelIndex < chart.data.labels.length) {
                  index = Math.round(labelIndex);
                }
              }
              if (index !== null) {
                const sectorName = chart.data.labels[index];
                showSectorDetails(sectorName);
              }
            }
          }
        });
      }

      const gainersTable = document.getElementById('gainersTable').getElementsByTagName('tbody')[0];
      const losersTable = document.getElementById('losersTable').getElementsByTagName('tbody')[0];
      gainersTable.innerHTML = '';
      losersTable.innerHTML = '';

      if (data.portfolio_gainers) {
        data.portfolio_gainers.forEach(item => {
          const row = gainersTable.insertRow();
          const sign = item.change_pct >= 0 ? '+' : '';
          row.innerHTML = `<td>${item.name}</td><td>${item.price_formatted}</td><td style="color:#4caf50">${sign}${item.change_pct.toFixed(2)}%</td>`;
        });
      }

      if (data.portfolio_losers) {
        data.portfolio_losers.forEach(item => {
          const row = losersTable.insertRow();
          const sign = item.change_pct >= 0 ? '+' : '';
          row.innerHTML = `<td>${item.name}</td><td>${item.price_formatted}</td><td style="color:#f44336">${sign}${item.change_pct.toFixed(2)}%</td>`;
        });
      }

    } catch(e) {
      console.error(e);
      document.body.innerHTML = '<div class="error-message">Ошибка загрузки данных. Проверьте подключение.</div>';
    }
  }

  function showSectorDetails(sectorName) {
    const filtered = allPositions.filter(p => p.sector === sectorName);
    const container = document.getElementById('sectorDetails');
    if (filtered.length === 0) {
      container.classList.add('hidden');
      return;
    }
    let html = `<h3>${sectorName}</h3><table><thead><tr><th>Название</th><th>Средняя</th><th>Доходность</th><th>Доля</th></tr></thead><tbody>`;
    filtered.forEach(p => {
      const sign = p.yield_pct >= 0 ? '+' : '';
      html += `<tr>
        <td>${p.name}</td>
        <td>${p.avg_price_formatted}</td>
        <td style="color:${p.yield_pct >= 0 ? '#4caf50' : '#f44336'}">${sign}${p.yield_pct.toFixed(2)}%</td>
        <td>${p.share}%</td>
      </tr>`;
    });
    html += '</tbody></table>';
    container.innerHTML = html;
    container.classList.remove('hidden');
  }

  async function loadOverrides() {
    try {
      const data = await apiCall('/api/overrides');
      const tbody = document.getElementById('overridesTable');
      while (tbody.firstChild) {
        tbody.removeChild(tbody.firstChild);
      }
      data.forEach(o => {
        const tr = document.createElement('tr');
        const tdTicker = document.createElement('td');
        tdTicker.textContent = o.ticker;
        tr.appendChild(tdTicker);
        const tdName = document.createElement('td');
        tdName.textContent = o.name;
        tr.appendChild(tdName);
        const tdActions = document.createElement('td');
        tdActions.className = 'actions';
        const btn = document.createElement('button');
        btn.textContent = 'Удалить';
        btn.addEventListener('click', () => removeOverride(o.ticker));
        tdActions.appendChild(btn);
        tr.appendChild(tdActions);
        tbody.appendChild(tr);
      });
    } catch(e) {
      console.error(e);
    }
  }

  async function addOverride() {
    const ticker = document.getElementById('newTicker').value.trim();
    const name = document.getElementById('newName').value.trim();
    if (!ticker || !name) return;
    try {
      await apiCall('/api/override', 'POST', { action: 'add', ticker, display_name: name });
      document.getElementById('newTicker').value = '';
      document.getElementById('newName').value = '';
      loadOverrides();
    } catch(e) {
      alert('Ошибка');
    }
  }

  async function removeOverride(ticker) {
    try {
      await apiCall('/api/override', 'POST', { action: 'remove', ticker });
      loadOverrides();
    } catch(e) {
      alert('Ошибка');
    }
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelector(`.tab:nth-child(${tab === 'portfolio' ? 1 : 2})`).classList.add('active');
    document.getElementById(tab).classList.add('active');
    if (tab === 'portfolio') loadPortfolio();
    else loadOverrides();
  }

  window.onload = () => loadPortfolio();
</script>
</body>
</html>
