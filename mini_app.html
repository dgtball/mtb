<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Управление портфелем</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  <style>
    :root {
      --bg: #121212;
      --surface: #1e1e1e;
      --text: #e0e0e0;
      --text-secondary: #9e9e9e;
      --accent: #2196F3;
      --positive: #4caf50;
      --negative: #f44336;
      --border: #333;
    }
    body {
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 12px;
      cursor: pointer;
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 13px;
    }
    .tab.active {
      color: var(--accent);
      border-bottom: 2px solid var(--accent);
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    .summary {
      background: var(--surface);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .label {
      color: var(--text-secondary);
      font-size: 12px;
    }
    .value {
      font-size: 24px;
      font-weight: bold;
    }
    .change {
      font-size: 16px;
    }
    .positive { color: var(--positive); }
    .negative { color: var(--negative); }
    .chart-container {
      width: 100%;
      max-width: 100%;
      margin: 0 0 16px 0;
      height: 300px;
    }
    .top-positions {
      background: var(--surface);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
    }
    th, td {
      padding: 8px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
    }
    th {
      color: var(--text-secondary);
      font-size: 10px;
    }
    .actions button {
      background: var(--negative);
      border: none;
      color: white;
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
    }
    .add-form {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      background: var(--surface);
      padding: 12px;
      border-radius: 12px;
    }
    .add-form input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px;
      border-radius: 6px;
    }
    .add-form button {
      background: var(--accent);
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
    }
    .sector-details {
      background: var(--surface);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .sector-details.hidden {
      display: none;
    }
  </style>
</head>
<body>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('portfolio')">Портфель</div>
    <div class="tab" onclick="switchTab('overrides')">Переименования</div>
    <div class="tab" onclick="switchTab('dividends')">Дивиденды</div>
  </div>

  <div id="portfolio" class="tab-content active">
    <div class="summary">
      <div class="summary-row">
        <span class="label">Стоимость портфеля</span>
        <span class="value" id="totalAmount">—</span>
      </div>
      <div class="summary-row">
        <span class="label">Изменение за день</span>
        <span class="change" id="dailyChange">—</span>
      </div>
    </div>
    <div class="chart-container">
      <canvas id="sectorChart"></canvas>
    </div>
    <div id="sectorDetails" class="sector-details hidden"></div>
    <div class="top-positions">
      <h3>📈 Лидеры роста</h3>
      <table id="gainersTable"><thead><tr><th>Название</th><th>Цена</th><th>Изм.</th></tr></thead><tbody></tbody></table>
      <h3>📉 Лидеры падения</h3>
      <table id="losersTable"><thead><tr><th>Название</th><th>Цена</th><th>Изм.</th></tr></thead><tbody></tbody></table>
    </div>
  </div>

  <div id="overrides" class="tab-content">
    <div class="add-form">
      <input type="text" id="newTicker" placeholder="Тикер">
      <input type="text" id="newName" placeholder="Новое название">
      <button onclick="addOverride()">Добавить</button>
    </div>
    <table>
      <thead><tr><th>Тикер</th><th>Название</th><th></th></tr></thead>
      <tbody id="overridesTable"></tbody>
    </table>
  </div>

  <div id="dividends" class="tab-content">
    <div class="chart-container" style="height:400px">
      <canvas id="dividendChart"></canvas>
    </div>
    <div id="dividendDetails" class="sector-details hidden"></div>
  </div>

<script>
  const API_TOKEN = 'MINI_APP_TOKEN_PLACEHOLDER';
  let sectorChart, dividendChart;
  let allPositions = [];

  async function apiCall(endpoint, method = 'GET', body = null) {
    const options = {
      method,
      headers: {
        'Content-Type': 'application/json',
        'X-Mini-App-Token': API_TOKEN
      }
    };
    if (body) options.body = JSON.stringify(body);
    const res = await fetch(endpoint, options);
    if (!res.ok) {
      console.error('Request failed', res.status, await res.text());
      throw new Error('Request failed');
    }
    return res.json();
  }

  async function loadPortfolio() {
    try {
      const data = await apiCall('/api/portfolio');
      document.getElementById('totalAmount').textContent = data.total_amount.toLocaleString() + ' ₽';
      const change = data.daily_change_pct;
      const changeEl = document.getElementById('dailyChange');
      if (change !== null && change !== undefined) {
        changeEl.textContent = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';
        changeEl.className = 'change ' + (change >= 0 ? 'positive' : 'negative');
      } else {
        changeEl.textContent = '—';
        changeEl.className = 'change';
      }

      allPositions = data.positions || [];

      if (data.sectors.length > 0) {
        const totalValue = data.sectors.reduce((sum, s) => sum + s.value, 0);
        const labels = data.sectors.map(s => s.name);
        const values = data.sectors.map(s => s.value);
        const percentages = data.sectors.map(s => totalValue > 0 ? (s.value / totalValue * 100) : 0);

        const ctx = document.getElementById('sectorChart').getContext('2d');
        if (sectorChart) sectorChart.destroy();
        sectorChart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: labels,
            datasets: [{
              data: values,
              backgroundColor: '#2196F3',
              borderRadius: 4,
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: { enabled: false },
              datalabels: {
                anchor: 'end',
                align: 'top',
                color: '#e0e0e0',
                font: { weight: 'bold', size: 11 },
                formatter: (value, context) => percentages[context.dataIndex].toFixed(1) + '%',
              }
            },
            scales: {
              x: {
                ticks: { color: '#9e9e9e' },
                grid: { display: false }
              },
              y: {
                ticks: { 
                  color: '#9e9e9e',
                  callback: value => value.toLocaleString() + ' ₽'
                },
                grid: { color: '#333' }
              }
            },
            onClick: (event, elements, chart) => {
              let index = null;
              if (elements.length > 0) {
                index = elements[0].index;
              } else {
                const xScale = chart.scales.x;
                const xPixel = event.x;
                const labelIndex = xScale.getValueForPixel(xPixel);
                if (typeof labelIndex === 'number' && labelIndex >= 0 && labelIndex < chart.data.labels.length) {
                  index = Math.round(labelIndex);
                }
              }
              if (index !== null) {
                const sectorName = chart.data.labels[index];
                showSectorDetails(sectorName);
              }
            }
          },
          plugins: [ChartDataLabels]
        });
      }

      const gainersTable = document.getElementById('gainersTable').getElementsByTagName('tbody')[0];
      const losersTable = document.getElementById('losersTable').getElementsByTagName('tbody')[0];
      gainersTable.innerHTML = '';
      losersTable.innerHTML = '';

      if (data.portfolio_gainers) {
        data.portfolio_gainers.forEach(item => {
          const row = gainersTable.insertRow();
          const sign = item.change_pct >= 0 ? '+' : '';
          row.innerHTML = `<td>${item.name}</td><td>${item.price_formatted}</td><td style="color:#4caf50">${sign}${item.change_pct.toFixed(2)}%</td>`;
        });
      }

      if (data.portfolio_losers) {
        data.portfolio_losers.forEach(item => {
          const row = losersTable.insertRow();
          const sign = item.change_pct >= 0 ? '+' : '';
          row.innerHTML = `<td>${item.name}</td><td>${item.price_formatted}</td><td style="color:#f44336">${sign}${item.change_pct.toFixed(2)}%</td>`;
        });
      }

    } catch(e) {
      console.error(e);
    }
  }

  async function loadDividends() {
    try {
      const data = await apiCall('/api/dividends');
      const ctx = document.getElementById('dividendChart').getContext('2d');
      if (dividendChart) dividendChart.destroy();
      
      if (!data.years || data.years.length === 0) {
        document.getElementById('dividendDetails').classList.add('hidden');
        return;
      }

      const colors = ['#2196F3','#FF9800','#4CAF50','#F44336','#9C27B0','#00BCD4','#FFEB3B','#795548','#607D8B','#E91E63',
                      '#3F51B5','#009688','#8BC34A','#CDDC39','#FFC107','#FF5722','#9E9E9E','#000000','#FFFFFF','#FF00FF'];

      dividendChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: data.years,
          datasets: data.datasets.map((ds, i) => ({
            label: ds.label,
            data: ds.data,
            backgroundColor: colors[i % colors.length],
            borderRadius: 4,
          }))
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'bottom',
              labels: { color: '#e0e0e0', font: { size: 10 } }
            },
            tooltip: {
              callbacks: {
                label: ctx => `${ctx.dataset.label}: ${ctx.raw.toLocaleString()} ₽`
              }
            }
          },
          scales: {
            x: {
              stacked: true,
              ticks: { color: '#9e9e9e' },
              grid: { display: false }
            },
            y: {
              stacked: true,
              ticks: { 
                color: '#9e9e9e',
                callback: value => value.toLocaleString() + ' ₽'
              },
              grid: { color: '#333' }
            }
          }
        }
      });
    } catch(e) {
      console.error(e);
    }
  }

  // ... остальные функции (showSectorDetails, loadOverrides, addOverride, removeOverride, switchTab) без изменений ...

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelector(`.tab:nth-child(${tab === 'portfolio' ? 1 : (tab === 'overrides' ? 2 : 3)})`).classList.add('active');
    document.getElementById(tab).classList.add('active');
    if (tab === 'portfolio') loadPortfolio();
    else if (tab === 'overrides') loadOverrides();
    else if (tab === 'dividends') loadDividends();
  }

  window.onload = () => loadPortfolio();
</script>
</body>
</html>
