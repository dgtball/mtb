<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Управление портфелем</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #121212;
      --surface: #1e1e1e;
      --text: #e0e0e0;
      --text-secondary: #9e9e9e;
      --accent: #2196F3;
      --positive: #4caf50;
      --negative: #f44336;
      --border: #333;
    }
    body {
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 12px;
      cursor: pointer;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .tab.active {
      color: var(--accent);
      border-bottom: 2px solid var(--accent);
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    .summary {
      background: var(--surface);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .label {
      color: var(--text-secondary);
      font-size: 12px;
    }
    .value {
      font-size: 24px;
      font-weight: bold;
    }
    .change {
      font-size: 16px;
    }
    .positive { color: var(--positive); }
    .negative { color: var(--negative); }
    .chart-container {
      width: 100%;
      max-width: 300px;
      margin: 0 auto 16px;
    }
    .top-positions {
      background: var(--surface);
      border-radius: 12px;
      padding: 16px;
    }
    .position-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .position-name {
      flex: 1;
    }
    .position-value {
      text-align: right;
      margin-left: 12px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    th {
      color: var(--text-secondary);
      font-size: 12px;
    }
    .actions button {
      background: var(--negative);
      border: none;
      color: white;
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
    }
    .add-form {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      background: var(--surface);
      padding: 12px;
      border-radius: 12px;
    }
    .add-form input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px;
      border-radius: 6px;
    }
    .add-form button {
      background: var(--accent);
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('portfolio')">Портфель</div>
    <div class="tab" onclick="switchTab('overrides')">Переименования</div>
  </div>

  <div id="portfolio" class="tab-content active">
    <div class="summary">
      <div class="summary-row">
        <span class="label">Стоимость портфеля</span>
        <span class="value" id="totalAmount">—</span>
      </div>
      <div class="summary-row">
        <span class="label">Изменение за день</span>
        <span class="change" id="dailyChange">—</span>
      </div>
    </div>
    <div class="chart-container">
      <canvas id="sectorChart"></canvas>
    </div>
    <div class="top-positions" id="topPositions"></div>
  </div>

  <div id="overrides" class="tab-content">
    <div class="add-form">
      <input type="text" id="newTicker" placeholder="Тикер">
      <input type="text" id="newName" placeholder="Новое название">
      <button onclick="addOverride()">Добавить</button>
    </div>
    <table>
      <thead><tr><th>Тикер</th><th>Название</th><th></th></tr></thead>
      <tbody id="overridesTable"></tbody>
    </table>
  </div>

<script>
  // Токен будет подставлен сервером при загрузке страницы
  const API_TOKEN = 'MINI_APP_TOKEN_PLACEHOLDER';
  let sectorChart;

  async function apiCall(endpoint, method = 'GET', body = null) {
    // Добавляем токен как параметр запроса
    const url = `${endpoint}?token=${encodeURIComponent(API_TOKEN)}`;
    const options = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) options.body = JSON.stringify(body);
    const res = await fetch(url, options);
    if (!res.ok) {
      console.error('Request failed', res.status, await res.text());
      throw new Error('Request failed');
    }
    return res.json();
  }

  async function loadPortfolio() {
    try {
      const data = await apiCall('/api/portfolio');
      document.getElementById('totalAmount').textContent = data.total_amount.toLocaleString() + ' ₽';
      const change = data.daily_change_pct;
      const changeEl = document.getElementById('dailyChange');
      if (change !== null && change !== undefined) {
        changeEl.textContent = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';
        changeEl.className = 'change ' + (change >= 0 ? 'positive' : 'negative');
      } else {
        changeEl.textContent = '—';
        changeEl.className = 'change';
      }

      if (data.sectors.length > 0) {
        const ctx = document.getElementById('sectorChart').getContext('2d');
        if (sectorChart) sectorChart.destroy();
        sectorChart = new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: data.sectors.map(s => s.name),
            datasets: [{
              data: data.sectors.map(s => s.value),
              backgroundColor: ['#2196F3','#FF9800','#4CAF50','#F44336','#9C27B0','#00BCD4','#FFEB3B','#795548','#607D8B','#E91E63']
            }]
          },
          options: {
            plugins: { legend: { position: 'bottom', labels: { color: '#e0e0e0' } } },
            cutout: '60%',
          }
        });
      }

      const topPos = data.positions.sort((a,b) => b.value - a.value).slice(0, 5);
      let html = '<h3 style="margin-top:0">Топ-5 позиций</h3>';
      topPos.forEach(p => {
        const sign = p.yield_pct >= 0 ? '+' : '';
        html += `
          <div class="position-item">
            <span class="position-name">${p.name}</span>
            <span class="position-value">${p.value.toLocaleString()} ₽ <br><span class="${p.yield_pct >= 0 ? 'positive' : 'negative'}">${sign}${p.yield_pct.toFixed(1)}%</span></span>
          </div>`;
      });
      document.getElementById('topPositions').innerHTML = html;
    } catch(e) {
      console.error(e);
    }
  }

  async function loadOverrides() {
    try {
      const data = await apiCall('/api/overrides');
      const tbody = document.getElementById('overridesTable');
      tbody.innerHTML = data.map(o => `
        <tr>
          <td>${o.ticker}</td>
          <td>${o.name}</td>
          <td class="actions"><button onclick="removeOverride('${o.ticker}')">Удалить</button></td>
        </tr>
      `).join('');
    } catch(e) {
      console.error(e);
    }
  }

  async function addOverride() {
    const ticker = document.getElementById('newTicker').value.trim();
    const name = document.getElementById('newName').value.trim();
    if (!ticker || !name) return;
    try {
      await apiCall('/api/override', 'POST', { action: 'add', ticker, display_name: name });
      document.getElementById('newTicker').value = '';
      document.getElementById('newName').value = '';
      loadOverrides();
    } catch(e) {
      alert('Ошибка');
    }
  }

  async function removeOverride(ticker) {
    try {
      await apiCall('/api/override', 'POST', { action: 'remove', ticker });
      loadOverrides();
    } catch(e) {
      alert('Ошибка');
    }
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelector(`.tab:nth-child(${tab === 'portfolio' ? 1 : 2})`).classList.add('active');
    document.getElementById(tab).classList.add('active');
    if (tab === 'portfolio') loadPortfolio();
    else loadOverrides();
  }

  window.onload = () => loadPortfolio();
</script>
</body>
</html>
